<!-- MAIN DISPLAY PAGE -->
<div id="display-page" class="page">
    <button id="open-settings">⚙️</button>
    <div class="split-container" id="main-container">
        <!-- Left Side Widget Container -->
        <div id="left-widget" class="widget-slot"></div>
        <!-- Right Side Widget Container -->
        <div id="right-widget" class="widget-slot"></div>
    </div>
</div>

<!-- SETTINGS PAGE -->
<div id="settings-page" class="page hidden">
    <div class="settings-content">
        <h1>Widget Layout</h1>
        
        <div class="settings-row">
            <label>Left Widget</label>
            <select id="left-selector">
                <option value="clock">Clock</option>
                <option value="weather">Weather</option>
                <option value="calendar">Calendar</option>
            </select>
        </div>

        <div class="settings-row">
            <label>Right Widget</label>
            <select id="right-selector">
                <option value="calendar">Calendar</option>
                <option value="clock">Clock</option>
                <option value="weather">Weather</option>
            </select>
        </div>

        <hr>
        <h1>Appearance</h1>
        <!-- ... keep your existing Font, Color, Seconds, and Night Mode settings here ... -->
        <button id="close-settings">Done</button>
    </div>
</div>
