<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPad StandBy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <!-- Initial Overlay to trigger WakeLock -->
    <div id="overlay">
        <button id="start-btn">Start StandBy</button>
    </div>

    <div class="container" id="main-container">
        <!-- Widget 1: Large Clock -->
        <div class="widget clock-widget">
            <h1 id="time">00:00</h1>
        </div>

        <!-- Widget 2: Date & Info -->
        <div class="widget info-widget">
            <p id="date">Monday, January 1</p>
            <div id="calendar-preview">
                <!-- You can add more info here later -->
                <p>Welcome</p>
            </div>
            <button id="night-toggle">Night Mode</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
